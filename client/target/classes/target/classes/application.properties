server.port=8080
spring.application.name=client

dependency.url=http://localhost:8081/api/dependency/data

# RestTemplate timeout (2 seconds)
resttemplate.connect-timeout=2000
resttemplate.read-timeout=2000

# Resilience4j Retry
resilience4j.retry.instances.myRetry.max-attempts=3
resilience4j.retry.instances.myRetry.wait-duration=1s
resilience4j.retry.instances.myRetry.retry-exceptions=java.lang.RuntimeException,org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.myCircuitBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.myCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.myCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.myCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.myCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j Bulkhead (SEMAPHORE - default)
resilience4j.bulkhead.instances.myBulkhead.max-concurrent-calls=2
resilience4j.bulkhead.instances.myBulkhead.max-wait-duration=10ms

# Actuator
management.endpoints.web.exposure.include=health,circuitbreakers,retries
management.endpoint.health.show-details=always

# Logging
logging.level.demo=DEBUG
logging.level.io.github.resilience4j=DEBUG
logging.level.demo.DependencyClient=DEBUG